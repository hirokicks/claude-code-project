  { id: "ruler", nameJa: "統治者", nameEn: "Ruler", quadrant: "stability", icon: "👑", role: "統制力を発揮する", coreDesire: "繁栄・秩序の維持", fear: "混乱・失墜", description: "秩序とコントロールを重視し、安定した組織・社会を構築する。権威と責任感を持ち、高い品質の基準を定める人格。", tone: "権威的・洗練・信頼感・格調", brands: ["Mercedes-Benz", "Rolex", "Microsoft", "American Express"], keywords: ["権威", "品質", "秩序", "安定", "リーダーシップ"] },

  { id: "everyman", nameJa: "一般大衆", nameEn: "Everyman", quadrant: "belonging", icon: "👥", role: "ありのままでいい", coreDesire: "所属感・繋がり", fear: "孤立・エリート主義", description: "等身大の親しみやすさで人々と繋がる。特別である必要はなく、共感と帰属意識を大切にする人格。", tone: "親しみやすい・誠実・等身大・フレンドリー", brands: ["IKEA", "Gap", "eBay", "Walmart"], keywords: ["親しみ", "共感", "誠実", "平等", "コミュニティ"] },
  { id: "lover", nameJa: "恋人", nameEn: "Lover", quadrant: "belonging", icon: "❤️", role: "愛を見つけ、与える", coreDesire: "親密さ・感覚的な豊かさ", fear: "孤独・無関心", description: "官能的な美しさと情熱で人々を魅了する。親密さと豊かな体験を通じて、特別な絆と深い共鳴を育む人格。", tone: "情熱的・官能的・洗練・プレミアム感", brands: ["Chanel", "Godiva", "Alfa Romeo", "Victoria's Secret"], keywords: ["情熱", "美", "親密さ", "官能", "魅力"] },

  { id: "outlaw", nameJa: "無法者", nameEn: "Outlaw", quadrant: "mastery", icon: "💥", role: "ルールを破る", coreDesire: "変革・革命", fear: "無力さ・形骸化", description: "既成概念を壊し、革命を起こす。ルールや制度に反抗し、真の自由と根本的な変革を求める人格。", tone: "反骨的・自由・挑発的・ロック", brands: ["Harley-Davidson", "Virgin", "Diesel", "Converse"], keywords: ["反抗", "自由", "破壊", "革命", "個性"] },
  { id: "magician", nameJa: "魔術師", nameEn: "Magician", quadrant: "mastery", icon: "✨", role: "生まれ変わりを促す", coreDesire: "知識・変容・奇跡", fear: "悪い副作用・意図しない結果", description: "夢を現実に変える触媒。変容と奇跡をもたらし、人々の可能性を広げ、世界を根本から変えようとする人格。", tone: "神秘的・変革的・インスピレーション・ビジョナリー", brands: ["Disney", "Mastercard", "Dyson", "Polaroid"], keywords: ["変容", "奇跡", "ビジョン", "魔法", "可能性"] },

  { id: "explorer", nameJa: "探検家", nameEn: "Explorer", quadrant: "freedom", icon: "🧭", role: "自立を保つ", coreDesire: "自由・発見・新体験", fear: "空虚さ・束縛", description: "自由と冒険を求め、世界を探求する。自己発見の旅を通じて真の自分を見つけ、常に新しい地平を目指す人格。", tone: "冒険的・自由・独立・発見・アクティブ", brands: ["REI", "Jeep", "National Geographic", "Patagonia"], keywords: ["冒険", "自由", "発見", "探求", "独立"] },

];

const WORKSHOP_STEPS = [
  {
    id: "soul", title: "ブランドの魂を探る", subtitle: "創業精神・ブランドのルーツを掘り下げる", icon: "🌱", color: "#6366f1",
    hint: "ブランドの歴史を紐解き、創業者の想いとブランドの誕生背景を探ります。",
    questions: [
      { id: "brandName", label: "ブランド名", required: true, type: "text", placeholder: "例：株式会社〇〇 / ブランド名" },
      { id: "mainBusiness", label: "主な事業内容", required: true, type: "text", placeholder: "例：Webデザイン・ブランディングコンサルティング" },
      { id: "founded", label: "創業年・従業員数（任意）", type: "text", placeholder: "例：2010年創業 / 従業員50名" },
      { id: "founderStory", label: "創業者の想い・ブランドが生まれた背景", type: "textarea", placeholder: "誰がどういう理由でこのブランドを生み出したのか？\nブランド誕生当時の社会背景は？\n創業当初のポジショニングは？" },
      { id: "brandCommunication", label: "最も印象的なブランドコミュニケーション", type: "textarea", placeholder: "これまで最も記憶に残るメッセージ・キャンペーン・スローガンは？" },
      { id: "customerRelationship", label: "顧客との関係性", type: "textarea", placeholder: "顧客はこのブランドとどのように関わってきたか？現在の関係は？" },
    ]
  },
  {
    id: "reality", title: "ブランドの実体を探る", subtitle: "現代における真実味を検証する", icon: "🔍", color: "#ec4899",
    hint: "ステップ①で見つかったアーキタイプが、現代においても真実味があるかを検証します。",
    questions: [
      { id: "brandRole", label: "ブランドの役割", type: "select", options: ["機能的（課題解決・利便性中心）", "価値観的（ライフスタイル・アイデンティティ表現）", "両方を兼ね備えている"] },
      { id: "involvement", label: "製品・サービスの関与度", type: "select", options: ["高関与型（高額・長期利用・慎重な購買）", "低関与型（日常的・手軽・習慣的購買）"] },
      { id: "coreValue", label: "ユーザーに与えるコアバリュー", required: true, type: "textarea", placeholder: "このブランドが提供する本質的な価値は？\n機能的・感情的・自己表現的にどんな意味があるか？" },
      { id: "targetCustomer", label: "ターゲット顧客像", required: true, type: "textarea", placeholder: "誰のためのブランドか？\nターゲットの価値観・ライフスタイル・動機は？" },
      { id: "brandAssets", label: "競合と比べて際立つ強み・独自性", type: "textarea", placeholder: "このブランドの本質的な強みと競合と比べて際立っている部分は？" },
      { id: "usagePattern", label: "顧客の利用パターン", type: "select", options: ["専らこのブランドのみ使用", "複数ブランドの中の一つ", "状況によって使い分け"] },
    ]
  },
  {
    id: "competition", title: "競合分析", subtitle: "市場における差別化ポイントを見極める", icon: "⚡", color: "#f59e0b",
    hint: "競合ブランドのアーキタイプを把握し、差別化の機会を探ります。",
    questions: [
      { id: "competitors", label: "主な競合ブランド", type: "text", placeholder: "例：〇〇社、△△社、□□社" },
      { id: "competitorArchetypes", label: "競合ブランドのイメージ・雰囲気", type: "textarea", placeholder: "競合ブランドはどのようなイメージを持っているか？\nどんな人格・トーンを表現しているか？" },
      { id: "differentiator", label: "差別化したい点・市場の空白", type: "textarea", placeholder: "競合とどう違いを出したいか？\n市場の中でまだ占有されていない感情的ポジションはあるか？" },
      { id: "categoryTrend", label: "業界・カテゴリーの傾向", type: "textarea", placeholder: "この業界全体で共通するトーンやイメージはあるか？\nカテゴリー全体で新しいアーキタイプを創出できるか？" },
    ]
  },
  {

    hint: "歴史的・マーケット視点とは別に、直感的な観点からアーキタイプを探ります。",
    questions: [
      { id: "philosophy", label: "ブランドのステートメント・理念", type: "textarea", placeholder: "企業理念・ミッション・ビジョン・バリューなど" },
      { id: "brandPersonality", label: "このブランドが「人」だとしたら？", type: "textarea", placeholder: "どんな人物像か？\nどんな言葉を使うか？どんな服装をしているか？\nどんな雰囲気・性格を持つか？" },
      { id: "idealImage", label: "理想のブランドイメージ・世界観", type: "textarea", placeholder: "目指したい視覚的な世界観、感情的な印象、雰囲気を教えてください" },
      { id: "challenges", label: "現在の課題と理想の状態", type: "textarea", placeholder: "今どんな課題がありますか？\nブランディングを通じてどうなりたいですか？" },

// ===================== HELPERS =====================

const getQuadrant = (id) => QUADRANTS.find(q => q.id === id);
const getArchetypesByQuadrant = (qid) => ARCHETYPES.filter(a => a.quadrant === qid);

// ===================== COMPONENTS =====================

function ProgressSteps({ current }) {
  const labels = [{ icon: "🌱", text: "魂" }, { icon: "🔍", text: "実体" }, { icon: "⚡", text: "競合" }, { icon: "🎯", text: "感性" }];
  return (
    <div style={{ padding: "16px 24px 0" }}>
      <div style={{ display: "flex", alignItems: "center" }}>
        {labels.map((l, i) => (
          <React.Fragment key={i}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 48 }}>
              <div style={{
                width: 32, height: 32, borderRadius: "50%", fontSize: 13,
                background: i < current ? "#2b70ef" : i === current ? "#ffffff" : "#f1f5f9",
                color: i < current ? "white" : i === current ? "#2b70ef" : "#94a3b8",
                border: i === current ? "2px solid #2b70ef" : "2px solid transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontWeight: 600,
                transition: "all 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
              }}>
                {i < current ? "✓" : l.icon}
              </div>
              <div style={{ fontSize: 11, marginTop: 4, color: i <= current ? "#2b70ef" : "#94a3b8", fontWeight: 500 }}>
                {l.text}
              </div>
            </div>
            {i < labels.length - 1 && (
              <div style={{
                flex: 1, height: 2, borderRadius: 2, margin: "0 4px",
                background: i < current ? "#2b70ef" : "#e2e8f0",
                transition: "background 0.3s", marginBottom: 16,
              }} />
            )}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function FieldInput({ q, value, onChange }) {
  const base = {
    width: "100%", padding: "10px 12px", border: "1px solid #cbd5e1",
    borderRadius: 8, fontSize: 15, background: "white",
    transition: "border-color 0.15s, box-shadow 0.15s",
    outline: "none", color: "#0f172a", lineHeight: 1.7,
    caretColor: "#2b70ef",
  };
  const focus = (e) => { e.target.style.borderColor = "#2b70ef"; e.target.style.boxShadow = "0 0 0 3px rgba(43,112,239,0.15)"; };
  const blur = (e) => { e.target.style.borderColor = "#cbd5e1"; e.target.style.boxShadow = "none"; };

  if (q.type === "textarea") return (
    <textarea value={value || ""} onChange={e => onChange(q.id, e.target.value)}
      placeholder={q.placeholder} rows={3}
      style={{ ...base, resize: "vertical" }}
      onFocus={focus} onBlur={blur} />
  );
  if (q.type === "select") return (
    <select value={value || ""} onChange={e => onChange(q.id, e.target.value)}
      style={{ ...base, cursor: "pointer" }} onFocus={focus} onBlur={blur}>
      <option value="">選択してください</option>
      {q.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
    </select>
  );
  return (
    <input type="text" value={value || ""} onChange={e => onChange(q.id, e.target.value)}
      placeholder={q.placeholder} style={base} onFocus={focus} onBlur={blur} />
  );
}

function Card({ children, style = {} }) {
  return (
    <div style={{
      background: "white", borderRadius: 12, padding: "28px",
      border: "1px solid #e2e8f0",
      boxShadow: "0 1px 2px rgba(0,0,0,0.05)",
      animation: "fadeIn 0.3s ease",
      ...style
    }}>
      {children}
    </div>
  );
}

function Btn({ children, onClick, variant = "primary", disabled = false, style = {} }) {
  const styles = {
    primary: {
      background: "#2b70ef",
      color: "white", border: "none",
    },
    outline: {
      background: "white", color: "#3d4b5f",
      border: "1px solid #e2e8f0",
    },
    danger: {
      background: "#ef4444",
      color: "white", border: "none",
    },
  };
  const hover = {
    primary: "#1a40b5",
    outline: "#f9fafb",
    danger: "#dc2626",
  };
  return (
    <button
      onClick={onClick} disabled={disabled}
      style={{
        height: 40, padding: "0 20px", borderRadius: 8, fontSize: 15, fontWeight: 600,
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.5 : 1,
        transition: "background 0.15s, box-shadow 0.15s",
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        ...styles[variant],
        ...style,
      }}
      onMouseOver={e => { if (!disabled) e.currentTarget.style.background = hover[variant]; }}
      onMouseOut={e => { if (!disabled) e.currentTarget.style.background = styles[variant].background; }}
    >
      {children}
    </button>
  );
}

// ===================== SCREENS =====================

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "40px 20px" }}>
      <Card>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>🔮</div>
          <h1 style={{ fontSize: 26, fontWeight: 700, color: "#0f172a", marginBottom: 12, lineHeight: 1.4, letterSpacing: "0.01em" }}>
            ブランドアーキタイプ<br />ワークショップツール
          </h1>
          <p style={{ fontSize: 15, color: "#64748b", lineHeight: 2.0 }}>
            企業・ブランドを12種類の「人格」になぞらえ、<br />
            ブランドの本質とアイデンティティを発見するフレームワーク
          </p>
          <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 8 }}>
            Carl Gustav Jung の「元型」理論 × Brand Personality ｜ Margaret Mark &amp; Carol S. Pearson (2001)
          </div>
        </div>

        {/* 4 Quadrants */}
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontWeight: 600, fontSize: 13, color: "#64748b", marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.08em" }}>
            12のアーキタイプ ― 4つの動機軸
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {QUADRANTS.map(q => (
              <div key={q.id} style={{
                background: "#f9fafb", border: "1px solid #e2e8f0",
                borderRadius: 8, padding: "14px 16px"
              }}>
                <div style={{ fontWeight: 600, color: "#0f172a", fontSize: 13, marginBottom: 2 }}>{q.name}</div>
                <div style={{ fontSize: 12, color: "#64748b", marginBottom: 10 }}>{q.subtitle}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {getArchetypesByQuadrant(q.id).map(a => (
                    <span key={a.id} style={{
                      fontSize: 12, background: "white", border: "1px solid #e2e8f0",
                      borderRadius: 9999, padding: "2px 10px", color: "#3d4b5f",
                      display: "flex", alignItems: "center", gap: 3

            <div style={{ background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, padding: "18px", fontSize: 14, color: "#3d4b5f", lineHeight: 1.9, whiteSpace: "pre-wrap" }}>
              {results.recommendations}

          </section>
        )}

        {/* All Scores */}
        <section style={{ marginBottom: 24 }}>
          <h2 style={{ fontSize: 17, fontWeight: 600, color: "#0f172a", marginBottom: 12 }}>📊 全アーキタイプ 適合度一覧</h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
            {QUADRANTS.map(q => (
              <div key={q.id} style={{ background: q.light, borderRadius: 12, padding: "12px" }}>
                <div style={{ fontWeight: 700, fontSize: 12, color: q.color, marginBottom: 8 }}>{q.name}</div>
                {getArchetypesByQuadrant(q.id).map(a => {
                  const s = results.scores?.find(x => x.id === a.id);
                  const score = s?.score || 0;
                  return (
                    <div key={a.id} style={{ marginBottom: 6 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 2 }}>
                        <span>{a.icon} {a.nameJa}</span>
                        <strong style={{ color: q.color }}>{score}</strong>
                      </div>
                      <div style={{ height: 4, background: "#e5e7eb", borderRadius: 2 }}>
                        <div style={{ width: `${score * 10}%`, height: "100%", background: q.color, borderRadius: 2 }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </section>

        {/* Notes */}
        <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 12, padding: "14px 16px", fontSize: 12, color: "#92400e" }}>
          ⚠️ このレポートはAI（Claude）による分析を含みます。アーキタイプの選定はあくまで提案の立脚点であり、最終的な判断はデザイナーとクライアントで行ってください。
        </div>

        {/* Footer */}
        <div style={{ marginTop: 28, textAlign: "center", fontSize: 11, color: "#9ca3af", borderTop: "1px solid #f0f0f0", paddingTop: 16 }}>

        </div>
      </div>
    </div>
  );
}

// ===================== AI ANALYSIS =====================

function detectProvider(apiKey) {
  if (apiKey.startsWith("AIza")) return "gemini";
  if (apiKey.startsWith("sk-ant-")) return "anthropic";
  return "unknown";
}

function buildPrompt(formData) {
  const info = Object.entries({
    "ブランド名": formData.brandName,
    "主な事業": formData.mainBusiness,
    "創業・規模": formData.founded,
    "創業の背景・創業者の想い": formData.founderStory,
    "ブランドコミュニケーション": formData.brandCommunication,
    "顧客との関係性": formData.customerRelationship,
    "ブランドの役割": formData.brandRole,
    "コアバリュー": formData.coreValue,
    "ターゲット顧客": formData.targetCustomer,
    "独自性・強み": formData.brandAssets,
    "利用パターン": formData.usagePattern,
    "競合ブランド": formData.competitors,
    "競合のイメージ": formData.competitorArchetypes,
    "差別化したい点": formData.differentiator,
    "業界傾向": formData.categoryTrend,
    "企業理念・ステートメント": formData.philosophy,
    "ブランドの人格像": formData.brandPersonality,
    "理想のイメージ": formData.idealImage,
    "課題と理想": formData.challenges,
  }).filter(([, v]) => v).map(([k, v]) => `・${k}：${v}`).join("\n");

  return `あなたはブランドマーケティングの専門家です。以下のブランド情報を深く分析し、12種類のブランドアーキタイプへの適合度を評価してください。

【ブランド情報】
${info}

【12種類のブランドアーキタイプ】
安定/制御：creator（創造者）、caregiver（援助者）、ruler（統治者）
帰属/楽しみ：jester（道化師）、everyman（一般大衆）、lover（恋人）
支配/リスク：hero（英雄）、outlaw（無法者）、magician（魔術師）
自立/自己実現：innocent（幼子）、explorer（探検家）、sage（賢者）

以下のJSON形式で回答してください（JSONのみ、説明文なし）：
{
  "scores": [
    {"id": "creator", "score": 7, "reason": "このブランドに適合/不適合する具体的な理由を1〜2文で"},
    {"id": "caregiver", "score": 4, "reason": "理由"},
    {"id": "ruler", "score": 8, "reason": "理由"},
    {"id": "jester", "score": 3, "reason": "理由"},
    {"id": "everyman", "score": 5, "reason": "理由"},
    {"id": "lover", "score": 6, "reason": "理由"},
    {"id": "hero", "score": 7, "reason": "理由"},
    {"id": "outlaw", "score": 4, "reason": "理由"},
    {"id": "magician", "score": 9, "reason": "理由"},
    {"id": "innocent", "score": 5, "reason": "理由"},
    {"id": "explorer", "score": 6, "reason": "理由"},
    {"id": "sage", "score": 5, "reason": "理由"}
  ],
  "analysis": "ブランドの本質的な特性とアーキタイプ傾向についての総合分析（350〜450字程度）",
  "recommendations": "最も適合するアーキタイプに基づいた具体的なブランディングアプローチの提案。コミュニケーションスタイル、ビジュアル方向性、差別化戦略を含む（350〜450字程度）"
}`;
}

function parseAIResponse(text) {
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("AIの回答を解析できませんでした。もう一度お試しください。");
  return JSON.parse(match[0]);
}

async function callAnthropic(apiKey, prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2500,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Anthropic APIエラー (${res.status})`);
  }
  const data = await res.json();
  const text = data.content?.[0]?.text || "";
  return parseAIResponse(text);
}

async function callGemini(apiKey, prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 2500 },
      }),
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Gemini APIエラー (${res.status})`);
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return parseAIResponse(text);
}

async function runAnalysis(apiKey, formData) {
  const prompt = buildPrompt(formData);
  const provider = detectProvider(apiKey);
  if (provider === "gemini") return callGemini(apiKey, prompt);
  if (provider === "anthropic") return callAnthropic(apiKey, prompt);
  throw new Error("APIキーの形式が認識できません。GeminiキーはAIzaで、AnthropicキーはSK-ANT-で始まります。");

}

// ===================== MAIN APP =====================

function App() {
  const [screen, setScreen] = useState("landing");
  const [step, setStep] = useState(0);
  const [formData, setFormData] = useState({});
  const [apiKey, setApiKey] = useState("");
  const [results, setResults] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleChange = useCallback((field, val) => {
    setFormData(prev => ({ ...prev, [field]: val }));
  }, []);

  const handleNext = () => {
    if (step < WORKSHOP_STEPS.length - 1) setStep(s => s + 1);
    else setScreen("apikey");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const handleBack = () => {
    if (screen === "apikey") { setScreen("workshop"); return; }
    if (step > 0) { setStep(s => s - 1); }
    else { setScreen("landing"); }
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const handleAnalyze = async () => {
    if (!apiKey.trim()) return;
    setLoading(true);
    setError("");
    setScreen("loading");
    try {
      const res = await runAnalysis(apiKey, formData);
      setResults(res);
      setScreen("results");
    } catch (e) {
      setError(e.message);
      setScreen("apikey");
    } finally {
      setLoading(false);
    }
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const handleRestart = () => {
    setScreen("landing");
    setStep(0);
    setFormData({});
    setResults(null);
    setError("");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  return (
    <div>
      {/* Navbar */}
      <nav style={{
        background: "rgba(255,255,255,0.9)", backdropFilter: "blur(8px)",
        borderBottom: "1px solid #e2e8f0", padding: "12px 24px",
        display: "flex", alignItems: "center", gap: 10,
        position: "sticky", top: 0, zIndex: 1000,
      }} className="no-print">
        <span style={{ fontSize: 20 }}>🔮</span>
        <span style={{ fontWeight: 600, fontSize: 15, color: "#0f172a" }}>
          ブランドアーキタイプ ワークショップ
        </span>
        {screen !== "landing" && (
          <button
            onClick={() => { if (window.confirm("ホームに戻りますか？入力内容は保持されます。")) setScreen("landing"); }}
            style={{ marginLeft: "auto", fontSize: 13, color: "#64748b", background: "none", border: "none", cursor: "pointer" }}
          >
            ← ホーム
          </button>
        )}
        <div style={{ marginLeft: screen === "landing" ? "auto" : 0, fontSize: 12, color: "#94a3b8" }}>
          Powered by AI
        </div>
      </nav>

      {/* Screens */}
      {screen === "landing" && <Landing onStart={() => { setScreen("workshop"); setStep(0); }} />}
      {screen === "workshop" && (
        <Workshop stepIndex={step} formData={formData} onChange={handleChange} onNext={handleNext} onBack={handleBack} />
      )}
      {screen === "apikey" && (
        <ApiKey apiKey={apiKey} setApiKey={setApiKey} onAnalyze={handleAnalyze} onBack={handleBack} isLoading={loading} error={error} />
      )}
      {screen === "loading" && <Loading />}
      {screen === "results" && results && (
        <Results results={results} formData={formData} onRestart={handleRestart} onReport={() => setScreen("report")} />
      )}
      {screen === "report" && results && (
        <Report results={results} formData={formData} onBack={() => setScreen("results")} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
